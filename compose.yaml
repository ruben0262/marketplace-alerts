services:
  marketplace-alerts:
    build: .
    image: marketplace-alerts:latest
    restart: unless-stopped
    init: true
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      # Host-visible state that survives container removal and `docker compose down`.
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
