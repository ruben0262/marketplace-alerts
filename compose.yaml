services:
  marketplace-alerts:
    build: .
    image: marketplace-alerts:latest
    restart: always
    init: true
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      # Host-visible state that survives container removal and `docker compose down`.
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Restarts any container that reports unhealthy, including marketplace-alerts when
  # its heartbeat healthcheck fails because the event loop wedged on a native call.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
