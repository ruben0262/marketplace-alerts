app:
  poll_interval_seconds: 60
  request_timeout_seconds: 20
  request_retries: 3
  state_file: data/listings.json
  # false seeds the state file on the first successful run without flooding Telegram.
  send_existing_on_start: false
  # Add a small random delay between cycles so several installations do not synchronize.
  poll_jitter_seconds: 5

telegram:
  max_images: 5
  disable_notification: false
  # Telegram recommends no more than about one message per second to one chat.
  min_send_interval_seconds: 1.1

translation:
  # Known marketplace condition labels are translated locally even when this is false.
  enabled: false
  target_language: EN-GB
  api_url: https://api-free.deepl.com/v2/translate
  failure_cooldown_seconds: 900

sources:
  ebay:
    # Enable after adding eBay credentials to .env.
    enabled: false
    marketplaces:
      - id: EBAY_GB
        delivery_country: GB
        currency: GBP
      - id: EBAY_DE
        delivery_country: DE
        currency: EUR
    pages_per_search: 3
    results_per_page: 50
    fetch_item_details: true
    retry_cooldown_seconds: 900

  # Vinted has no supported public developer API. This adapter uses the web catalog
  # endpoint and may need maintenance if Vinted changes it. Keep polling considerate.
  vinted:
    enabled: true
    sites:
      - url: https://www.vinted.co.uk
        name: Vinted UK
      - url: https://www.vinted.fr
        name: Vinted France
      - url: https://www.vinted.de
        name: Vinted Germany
      - url: https://www.vinted.es
        name: Vinted Spain
      - url: https://www.vinted.it
        name: Vinted Italy
      - url: https://www.vinted.nl
        name: Vinted Netherlands
      - url: https://www.vinted.be
        name: Vinted Belgium
      - url: https://www.vinted.pt
        name: Vinted Portugal
      - url: https://www.vinted.hu
        name: Vinted Hungary
    pages_per_search: 2
    results_per_page: 40
    fetch_item_details: true
    # Anonymous cookies persist in the Docker data volume between restarts.
    cookies_dir: data/vinted-cookies
    # Avoid retrying a blocked site on every search and every minute.
    retry_cooldown_seconds: 900
    # Minimum seconds between every Vinted request (catalog + detail) to avoid rate
    # limits when scanning many sites and enriching items. Set 0 to disable pacing.
    request_spacing_seconds: 1.0

searches:
  - name: Example apparel search
    query: example brand
    sources: [ebay, vinted]
    max_age_hours: 24
    min_price: 5
    max_price: 250
    # Structured brand data must match after case/space/punctuation normalization.
    required_brands: [example brand]
    # Exact labels only; list aliases explicitly when a marketplace may use several forms.
    excluded_sizes: [xs, x-small, extra small, s, small]
    include_keywords: []
    # Every group must match at least one phrase. This example is intentionally empty.
    # include_any_groups:
    #   - [xl, xxl]
    #   - [t-shirt, hoodie, sweatshirt]
    exclude_keywords: [poster, sticker]
    # Optional source-specific category filters:
    ebay_category_ids: []
    vinted_catalog_ids: []

  - name: Example exact product
    query: "boxing tracksuit"
    sources: [ebay, vinted]
    max_age_hours: 12
    max_price: 150
