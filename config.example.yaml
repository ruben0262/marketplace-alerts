# Minimal configuration. Every field not shown here falls back to a sensible
# default (see listing_monitor/config.py). Credentials live in .env, not here.

app:
  # How often to scan both platforms, in seconds (minimum 15).
  poll_interval_seconds: 120
  # true sends everything found on the first run; false quietly seeds the state
  # file and only posts listings discovered afterwards.
  send_existing_on_start: false

translation:
  # Translate foreign Vinted titles/descriptions to English. Needs DEEPL_API_KEY.
  # Built-in condition labels (e.g. "Neuf avec étiquette") translate regardless.
  enabled: true

sources:
  ebay:
    enabled: true
    marketplaces:
      - id: EBAY_GB
        delivery_country: GB
      - id: EBAY_DE
        delivery_country: DE
      - id: EBAY_FR
        delivery_country: FR

  vinted:
    enabled: true
    # Vinted catalog already carries brand and size, so detail lookups are optional.
    fetch_item_details: false
    # Optional residential proxy via VINTED_PROXY in .env if a datacenter IP is blocked.
    sites:
      - url: https://www.vinted.co.uk
        name: Vinted UK
      - url: https://www.vinted.fr
        name: Vinted France
      - url: https://www.vinted.de
        name: Vinted Germany

searches:
  # One search per thing you track. required_brands matches structured brand data;
  # excluded_sizes / exclude_keywords drop unwanted variants. A single-token query
  # is matched on eBay as an exact phrase to avoid unrelated results.
  - name: BOXRAW
    query: boxraw
    max_age_hours: 24
    required_brands: [boxraw]
    excluded_sizes: [xs, x-small, extra small, s, small]
    exclude_keywords: [poster, sticker, keyring, beanie, wraps, womens, ladies, girls, kids]
